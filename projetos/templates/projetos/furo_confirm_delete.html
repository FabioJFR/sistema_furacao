{% extends 'projetos/base.html' %}
{% block content %}
<section class="container mx-auto p-6">
    <div class="max-w-md mx-auto bg-gray-800 text-gray-100 rounded-xl shadow-lg p-8 space-y-6 text-center">
        <h2 class="text-2xl font-bold">🗑️ Apagar Furo</h2>
        <p>Tem certeza que deseja apagar o furo <strong>{{ furo.nome }}</strong>?</p>

        <form method="POST">
            {% csrf_token %}
            <div class="flex gap-3 mt-4">
                <button type="submit" class="flex-1 bg-red-600 hover:bg-red-700 transition text-white font-semibold py-2 rounded-lg shadow">Sim, apagar</button>
                <a href="{% url 'projetos:furo_list' %}" class="flex-1 bg-gray-600 hover:bg-gray-700 transition text-white font-semibold py-2 rounded-lg shadow text-center">Cancelar</a>
            </div>
        </form>
    </div>
</section>
{% endblock %}
