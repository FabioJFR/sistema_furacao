{% extends "projetos/base.html" %}

{% block title %}Apagar Projeto{% endblock %}

{% block content %}
<section class="container mx-auto p-6">

    <!-- CARD DE CONFIRMAÇÃO -->
    <div class="max-w-md mx-auto bg-red-600 text-white rounded-xl shadow-lg p-8 text-center">

        <h2 class="text-2xl font-bold mb-4">⚠️ Confirmação de Exclusão</h2>
        <p class="mb-2">Tem certeza que deseja apagar o projeto <strong>{{ projeto.nome }}</strong>?</p>
        <p class="text-sm opacity-90 mb-6">Esta ação não pode ser desfeita!</p>

        <form method="POST" class="flex justify-center gap-4">
            {% csrf_token %}

            <button type="submit" 
                    class="bg-white text-red-600 font-bold px-5 py-2 rounded-lg hover:bg-gray-100 transition shadow">
                🗑️ Apagar
            </button>

            <a href="{% url 'projetos:projeto_detail' projeto.pk %}" 
               class="bg-blue-600 text-white font-bold px-5 py-2 rounded-lg hover:bg-blue-700 transition shadow">
                ❌ Cancelar
            </a>
        </form>

    </div>

</section>
{% endblock %}
