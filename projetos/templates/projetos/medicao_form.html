{% extends 'projetos/base.html' %}

{% block content %}
<section class="container mx-auto p-6">

    <!-- CARD -->
    <div class="max-w-2xl mx-auto bg-white rounded-xl shadow-lg p-8 border-t-4 border-blue-600">

        <!-- HEADER -->
        <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">
            {{ titulo }}
        </h1>

        <!-- FORM -->
        <form method="post" class="space-y-5">
            {% csrf_token %}

            <!-- CAMPOS -->
            <div class="space-y-4">
                {{ form.as_p }}
            </div>

            <!-- BOTÕES -->
            <div class="flex gap-3 pt-4">

                <!-- SALVAR -->
                <button type="submit" 
                        class="flex-1 flex items-center justify-center bg-green-600 text-white py-2 rounded-lg font-semibold hover:bg-green-700 transition shadow">
                    💾 Salvar
                </button>

                <!-- VOLTAR -->
                <a href="{% url 'projetos:medicao_list' %}" 
                   class="flex-1 flex items-center justify-center bg-gray-500 text-white py-2 rounded-lg font-semibold hover:bg-gray-600 transition shadow">
                    🔙 Voltar
                </a>

            </div>
        </form>

    </div>

</section>
{% endblock %}
