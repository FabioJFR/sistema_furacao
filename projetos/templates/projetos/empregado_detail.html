{% extends "projetos/base.html" %}
<!-- projetos/templates/projetos/empregado_detail.html -->

{% block content %}
<section class="container mx-auto p-6">
    <div class="card max-w-lg mx-auto p-6">
        <h2 class="text-2xl font-bold text-gray-800 mb-4">{{ empregado.nome }}</h2>

        <p><strong>Função:</strong> {{ empregado.funcao }}</p>
        <p><strong>Email:</strong> {{ empregado.email }}</p>
        <p><strong>Data de Admissão:</strong> {{ empregado.data_admissao }}</p>

        <!-- BOTÕES -->
        <div class="flex gap-3 mt-6">
            <!-- Editar -->
            <a href="{% url 'projetos:empregado_update' empregado.id %}" 
               class="btn btn-warning flex-1 text-center">
                ✏️ Editar
            </a>

            <!-- Apagar -->
            <a href="{% url 'projetos:empregado_delete' empregado.id %}" 
               class="btn btn-danger flex-1 text-center">
                🗑️ Apagar
            </a>
        </div>

        <!-- Voltar -->
        <div class="mt-4">
            <a href="{% url 'projetos:empregado_list' %}" class="btn btn-primary">
                🔙 Voltar à Lista
            </a>
        </div>
    </div>
</section>
{% endblock %}
